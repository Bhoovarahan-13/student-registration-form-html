<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration Form</h1>
    <form action="">
        <label for="">Full Name:</label> 
        <br>
        <input type="Name" placeholder="Enter your name" required>
        <br>
        <br>
        <label for="">Email:</label> 
        <br>
        <input type="email" placeholder="Enter your mail" required>
        <br>
        <br>
        <label for="">Password:</label> 
        <br>
        <input type="password" placeholder="Enter your Password" required>
        <br>
        <br>
        <label for="">Gender:</label> <br>
        <label for="male"><input type="radio" name="Gender" id="male" required>Male</label>
        <label for="Female"><input type="radio" name="Gender" id="Female" required>Female</label>
        <br>
        <br>

        <label for="">Skills:</label> <br>
        <label for="HTML"><input type="checkbox" name="Skills" id="HTML" required>HTML</label>
        <label for="CSS"><input type="checkbox" name="Skills" id="CSS"required>CSS</label>
        <label for="JavaScript"><input type="checkbox" name="Skills" id="JavaScript"required>JavaScript</label>
        <br>
        <br>


        <label for="">DOB</label> 
        <br>
        <input type="date" required>
        <br>

        <br>
        <button type="submit">Register</button>
    </form>

    <br>
    <br>

    <h2>Submitted Students</h2>
    <table border="1" cellpadding="5">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>Skills</th>
            <th>DOB</th>            
        </tr>
        <tr>
            <td>Alice</td>
            <td>alice@example.com</td>
            <td>Female</td>
            <td>HTML,CSS</td>
            <td>2002-05-10</td>
            
        </tr>
        <tr>
            <td>Bob</td>
            <td>bob@example.com</td>
            <td>Male</td>
            <td>JavaScript</td>
            <td>2001-11-22</td>
        </tr>
    </table>

</body>
</html>
